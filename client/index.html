<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Resto QR - Menu</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/css/main.css">
    
    <style>
        /* Styles supplémentaires spécifiques au client */
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item.active i {
            transform: translateY(-2px);
        }
        
        .plat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .floating-cart {
            animation: float 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body class="antialiased bg-background">
    <div id="app" class="min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="bg-white/90 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="font-serif text-2xl sm:text-3xl font-semibold text-gray-800">
                            Le Bistrot Parisien
                        </h1>
                        <div class="flex items-center gap-2 mt-1">
                            <i class="fas fa-qrcode text-primary text-sm"></i>
                            <span class="text-sm text-gray-500">Table <strong id="table-number">-</strong></span>
                            <span class="text-gray-300">|</span>
                            <span class="text-sm text-gray-500"><i class="far fa-clock mr-1"></i>Session: <span id="session-timer">--:--</span></span>
                        </div>
                    </div>
                    
                    <div class="desktop-only">
                        <button id="desktop-cart-btn" class="relative bg-primary hover:bg-primary-dark text-white px-5 py-2.5 rounded-full flex items-center gap-2 transition-all shadow-md hover:shadow-lg">
                            <i class="fas fa-shopping-bag"></i>
                            <span>Mon panier</span>
                            <span id="desktop-cart-count" class="bg-white text-primary text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
                        </button>
                    </div>
                    
                    <button class="mobile-only text-gray-600 p-2">
                        <i class="fas fa-ellipsis-h text-xl"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Main Content -->
        <main id="main-content" class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 pb-24 md:pb-12">
            <!-- Dynamic content -->
        </main>
        
        <!-- Bottom Navigation (Mobile) -->
        <nav class="mobile-only fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-gray-100 bottom-nav z-50">
            <div class="flex items-center justify-around py-2">
                <button data-view="menu" class="nav-item flex flex-col items-center gap-1 px-4 py-2 text-gray-500 active">
                    <i class="fas fa-utensils text-xl"></i>
                    <span class="text-xs font-medium">Menu</span>
                </button>
                <button data-view="cart" class="nav-item flex flex-col items-center gap-1 px-4 py-2 text-gray-500 relative">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span class="text-xs font-medium">Panier</span>
                    <span id="mobile-cart-badge" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
                </button>
                <button data-view="track" class="nav-item flex flex-col items-center gap-1 px-4 py-2 text-gray-500">
                    <i class="fas fa-clipboard-list text-xl"></i>
                    <span class="text-xs font-medium">Suivi</span>
                </button>
                <button data-view="profile" class="nav-item flex flex-col items-center gap-1 px-4 py-2 text-gray-500">
                    <i class="fas fa-user text-xl"></i>
                    <span class="text-xs font-medium">Client</span>
                </button>
            </div>
        </nav>
        
        <!-- Floating Cart Button (Mobile) -->
        <button id="floating-cart" class="mobile-only fixed bottom-20 right-4 bg-primary text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center floating-cart hidden z-40">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span id="floating-cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </button>
        
        <!-- Desktop Sidebar Navigation -->
        <div class="desktop-nav hidden fixed left-0 top-1/2 -translate-y-1/2 z-30 ml-4">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-2 flex flex-col gap-1">
                <button data-view="menu" class="nav-item-desktop w-12 h-12 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-50 active">
                    <i class="fas fa-utensils text-xl"></i>
                </button>
                <button data-view="cart" class="nav-item-desktop w-12 h-12 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-50 relative">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span id="desktop-sidebar-cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
                </button>
                <button data-view="track" class="nav-item-desktop w-12 h-12 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-50">
                    <i class="fas fa-clipboard-list text-xl"></i>
                </button>
                <button data-view="profile" class="nav-item-desktop w-12 h-12 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-50">
                    <i class="fas fa-user text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="menu-template">
        <div>
            <!-- Day Tabs -->
            <div id="day-tabs" class="flex gap-2 overflow-x-auto hide-scrollbar pb-4 mb-6"></div>
            
            <!-- Filters -->
            <div class="mb-6 grid gap-3 lg:grid-cols-[1fr_220px_220px]">
                <input id="menu-search" type="search" placeholder="Rechercher un plat..." class="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:border-primary focus:ring-4 focus:ring-primary/20">
                <select id="menu-category-filter" class="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:border-primary focus:ring-4 focus:ring-primary/20">
                    <option value="all">Toutes les catégories</option>
                    <option value="entree">Entrées</option>
                    <option value="plat">Plats</option>
                    <option value="boisson">Boissons</option>
                </select>
                <select id="menu-sort" class="w-full rounded-2xl border border-gray-200 px-4 py-3 outline-none focus:border-primary focus:ring-4 focus:ring-primary/20">
                    <option value="category:asc">Trier par catégorie</option>
                    <option value="name:asc">Nom A-Z</option>
                    <option value="price:asc">Prix croissant</option>
                    <option value="price:desc">Prix décroissant</option>
                </select>
            </div>
            
            <!-- Menu List -->
            <div id="menu-list" class="space-y-8"></div>
        </div>
    </template>
    
    <template id="cart-template">
        <div class="max-w-2xl mx-auto">
            <h2 class="font-serif text-2xl font-semibold mb-6">Mon panier</h2>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            <div id="cart-empty" class="text-center py-12">
                <i class="fas fa-shopping-bag text-5xl text-gray-300 mb-4"></i>
                <p class="text-gray-500">Votre panier est vide</p>
                <button data-view="menu" class="mt-4 text-primary font-medium">Découvrir notre menu →</button>
            </div>
            <div id="cart-summary" class="border-t border-gray-200 pt-6 mt-6 hidden">
                <div class="flex justify-between mb-3">
                    <span class="text-gray-600">Sous-total</span>
                    <span id="subtotal" class="font-medium">0 FCFA</span>
                </div>
                <div class="flex justify-between mb-3">
                    <span class="text-gray-600">TVA (10%)</span>
                    <span id="tax" class="font-medium">0 FCFA</span>
                </div>
                <div class="flex justify-between text-lg font-bold mt-4 pt-4 border-t border-gray-200">
                    <span>Total</span>
                    <span id="total" class="text-primary">0 FCFA</span>
                </div>
                <button id="validate-order" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl mt-6 transition-all shadow-md hover:shadow-lg">
                    Commander
                </button>
            </div>
        </div>
    </template>
    
    <template id="track-template">
        <div class="max-w-3xl mx-auto">
            <h2 class="font-serif text-2xl font-semibold mb-6">Suivi de commande</h2>
            <div id="active-orders" class="space-y-6"></div>
            <div id="no-orders" class="text-center py-12">
                <i class="fas fa-receipt text-5xl text-gray-300 mb-4"></i>
                <p class="text-gray-500">Aucune commande en cours</p>
                <button data-view="menu" class="mt-4 text-primary font-medium">Commander maintenant →</button>
            </div>
        </div>
    </template>
    
    <template id="profile-template">
        <div class="max-w-md mx-auto">
            <h2 class="font-serif text-2xl font-semibold mb-6">Vos informations</h2>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nom complet</label>
                    <input type="text" id="customer-name" placeholder="Jean Dupont" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Numéro de téléphone</label>
                    <input type="tel" id="customer-phone" placeholder="06 12 34 56 78" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre de couverts</label>
                    <div class="flex items-center gap-3">
                        <button id="guests-minus" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50">-</button>
                        <span id="guests-count" class="text-lg font-semibold w-12 text-center">2</span>
                        <button id="guests-plus" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50">+</button>
                    </div>
                </div>
                <button id="save-profile" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl transition-all">
                    Enregistrer
                </button>
            </div>
        </div>
    </template>
    
    <!-- Plat Modal -->
    <div id="plat-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 p-4">
        <div class="max-h-[90vh] w-full max-w-2xl overflow-auto bg-white rounded-2xl shadow-2xl">
            <div class="sticky top-0 bg-white border-b border-gray-100 p-4 flex items-center justify-between">
                <h2 id="modal-plat-name" class="text-xl font-bold"></h2>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <img id="modal-plat-image" src="" alt="" class="w-full h-64 object-cover rounded-xl mb-4">
                <p id="modal-plat-description" class="text-gray-600 mb-4"></p>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-gray-50 p-3 rounded-xl">
                        <p class="text-xs text-gray-500">Prix</p>
                        <p id="modal-plat-price" class="text-lg font-bold text-primary"></p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl">
                        <p class="text-xs text-gray-500">Préparation</p>
                        <p id="modal-plat-prep" class="text-lg font-bold"></p>
                    </div>
                </div>
                
                <div class="mb-6">
                    <p class="text-sm font-medium mb-2">Jours consultables</p>
                    <div id="modal-plat-days" class="flex flex-wrap gap-2"></div>
                </div>
                
                <form id="order-form">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Quantité</label>
                            <input id="order-quantity" type="number" min="1" value="1" class="w-full border border-gray-200 rounded-xl px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Nom</label>
                            <input id="customer-name-modal" type="text" placeholder="Votre nom" class="w-full border border-gray-200 rounded-xl px-4 py-2">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Téléphone</label>
                        <input id="customer-phone-modal" type="tel" placeholder="Votre téléphone" class="w-full border border-gray-200 rounded-xl px-4 py-2">
                    </div>
                    
                    <div id="unit-configurations-section" class="mb-6 hidden">
                        <p class="text-sm font-medium mb-2">Personnalisation par exemplaire</p>
                        <div id="unit-configurations" class="space-y-3"></div>
                    </div>
                    
                    <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                        <span class="text-gray-600">Total estimé</span>
                        <span id="modal-total-price" class="text-xl font-bold text-primary"></span>
                    </div>
                    
                    <button type="submit" id="submit-order" class="w-full mt-6 bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl transition-all">
                        Ajouter au panier
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { store } from '../shared/js/store.js';
        import { navigation } from './assets/js/navigation.js';
        import { sessionManager } from './assets/js/session.js';
        import { showToast } from '../shared/js/utils.js';
        
        // Initialiser la navigation
        navigation.init();
        
        // Démarrer la session depuis l'URL
        try {
            const session = await sessionManager.initFromUrl();
            
            if (!session) {
                // Afficher un message pour scanner un QR code
                document.getElementById('main-content').innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-qrcode text-6xl text-primary mb-4"></i>
                        <h2 class="text-xl font-semibold mb-2">Bienvenue au Bistrot Parisien</h2>
                        <p class="text-gray-600">Scannez le QR code sur votre table pour commencer</p>
                    </div>
                `;
            } else {
                // Charger la vue par défaut
                store.set('currentView', 'menu');
            }
        } catch (error) {
            console.error('Erreur initialisation:', error);
            showToast('Erreur de connexion au serveur', 'error');
        }
    </script>
</body>
</html>
