<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Éclat Gourmet - Restaurant haut de gamme</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/style.css">

    <header class="bg-white shadow">
        <div class="container mx-auto flex items-center justify-between py-4 px-6">

            <nav class="space-x-6">

    <main class="container mx-auto py-10 px-6">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">Notre Menu</h1>

        <div class="container mx-auto text-center">
            &copy; 2024 Éclat Gourmet. Tous droits réservés.
