<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QRCode - Gestion des compositions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/css/main.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <i class="fas fa-utensils text-2xl text-primary"></i>
                    <span class="font-bold text-lg text-gray-800">Resto QRCode</span>
                </div>
                <p class="text-xs text-gray-500 mt-2">Espace administrateur</p>
            </div>
            
            <nav class="flex-1 p-4 space-y-1">
                <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>Tableau de bord</span>
                </a>
                <a href="./plats.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-hamburger w-5"></i>
                    <span>Articles</span>
                </a>
                <a href="./categories.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-layer-group w-5"></i>
                    <span>Categories</span>
                </a>
                <a href="./compositions.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-100 text-primary font-medium">
                    <i class="fas fa-pepper-hot w-5 text-yellow-500"></i>
                    <span class="text-yellow-500">Compositions</span>
                    <div class="ml-auto bg-yellow-500 w-1 h-8 rounded"></div>
                </a>
                <a href="./tables.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-table w-5"></i>
                    <span>Tables</span>
                </a>
                <a href="./commandes.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-clipboard-list w-5"></i>
                    <span>Commandes</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-200">
                <button id="logout-btn" class="flex items-center gap-3 px-4 py-3 w-full rounded-xl text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span>Déconnexion</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white border-b border-gray-200 px-8 py-4">
                <h1 class="text-2xl font-bold text-gray-800">Gestion des compositions</h1>
                <p class="text-sm text-gray-500 mt-1">Ingrédients, options et allergènes</p>
            </header>
            
            <div class="p-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Formulaire d'ajout -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <h2 class="text-lg font-semibold mb-4">Nouvelle composition</h2>
                        <form id="composition-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Nom *</label>
                                <input type="text" id="comp-name" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Description</label>
                                <textarea id="comp-description" rows="3" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                            </div>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" id="comp-allergen" class="rounded border-gray-300 text-primary focus:ring-primary">
                                <span class="text-sm">Cet ingrédient est un allergène</span>
                            </label>
                            <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-3 rounded-xl transition-colors">
                                Ajouter la composition
                            </button>
                        </form>
                    </div>
                    
                    <!-- Liste des compositions -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold">Liste des compositions</h2>
                            <div class="flex gap-2">
                                <input type="text" id="search-comps" placeholder="Rechercher..." class="px-3 py-1.5 border border-gray-200 rounded-xl text-sm">
                                <button id="refresh-comps" class="px-3 py-1.5 border border-gray-200 rounded-xl hover:bg-gray-50">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                            </div>
                        </div>
                        <div id="compositions-list" class="space-y-2 max-h-[500px] overflow-auto">
                            <div class="text-center py-8 text-gray-500">Chargement...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { auth } from '../shared/js/auth.js';
        import { api } from '../shared/js/api.js';
        import { showToast, confirmDialog, escapeHtml, debounce } from '../shared/js/utils.js';
        
        // Vérifier l'accès admin
        if (!auth.isAdmin()) {
            window.location.href = './index.html';
        }
        
        const compositionsList = document.getElementById('compositions-list');
        const searchInput = document.getElementById('search-comps');
        const refreshBtn = document.getElementById('refresh-comps');
        
        async function loadCompositions() {
            try {
                const search = searchInput.value.trim();
                const params = search ? { search } : {};
                const response = await api.compositions.getAll(params);
                renderCompositions(response.data || []);
            } catch (error) {
                showToast(error.message, 'error');
                compositionsList.innerHTML = '<div class="text-center py-8 text-red-500">Erreur de chargement</div>';
            }
        }
        
        function renderCompositions(compositions) {
            if (!compositions.length) {
                compositionsList.innerHTML = '<div class="text-center py-8 text-gray-500">Aucune composition trouvée</div>';
                return;
            }
            
            compositionsList.innerHTML = compositions.map(comp => `
                <div class="flex items-center justify-between p-3 border border-gray-100 rounded-lg hover:bg-gray-50">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="font-medium">${escapeHtml(comp.name)}</span>
                            ${comp.is_allergen ? '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">⚠️ Allergène</span>' : ''}
                        </div>
                        ${comp.description ? `<p class="text-sm text-gray-500 mt-1">${escapeHtml(comp.description)}</p>` : ''}
                        <p class="text-xs text-gray-400 mt-1">ID: ${escapeHtml(comp.id)}</p>
                    </div>
                    <button class="delete-comp text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm transition-colors" data-id="${escapeHtml(comp.id)}">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
            
            // Attacher les événements de suppression
            document.querySelectorAll('.delete-comp').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const confirmed = await confirmDialog('Supprimer cette composition ? Elle sera retirée de tous les plats qui l\'utilisent.', 'Confirmation');
                    if (!confirmed) return;
                    
                    try {
                        await api.compositions.delete(id);
                        showToast('Composition supprimée', 'success');
                        loadCompositions();
                    } catch (error) {
                        showToast(error.message, 'error');
                    }
                });
            });
        }
        
        // Formulaire d'ajout
        const compositionForm = document.getElementById('composition-form');
        compositionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('comp-name').value.trim();
            const description = document.getElementById('comp-description').value.trim();
            const isAllergen = document.getElementById('comp-allergen').checked;
            
            if (!name) {
                showToast('Le nom est requis', 'warning');
                return;
            }
            
            try {
                await api.compositions.create({ name, description, is_allergen: isAllergen });
                showToast('Composition ajoutée', 'success');
                compositionForm.reset();
                loadCompositions();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });
        
        // Filtres
        const debouncedLoad = debounce(loadCompositions, 300);
        searchInput.addEventListener('input', debouncedLoad);
        refreshBtn.addEventListener('click', loadCompositions);
        
        // Déconnexion
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await auth.logout();
            window.location.href = './index.html';
        });
        
        // Initialisation
        loadCompositions();
    </script>
</body>
</html>
