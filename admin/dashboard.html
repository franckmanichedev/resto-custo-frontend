<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QRCode - Dashboard</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/css/main.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <i class="fas fa-utensils text-2xl text-primary"></i>
                    <span class="font-bold text-lg text-gray-800">Resto QRCode</span>
                </div>
                <p class="text-xs text-gray-500 mt-2">Espace administrateur</p>
            </div>
            
            <nav class="flex-1 p-4 space-y-1">
                <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-100 text-primary font-medium">
                    <i class="fas fa-chart-line w-5 text-yellow-500"></i>
                    <span class="text-black text-yellow-500">Tableau de bord</span>
                    <div class="ml-auto bg-yellow-500 w-1 h-8 rounded"></div>
                </a>
                <a href="./plats.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-hamburger w-5"></i>
                    <span class="text-black">Plats</span>
                </a>
                <a href="./compositions.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-pepper-hot w-5"></i>
                    <span class="text-black">Compositions</span>
                </a>
                <a href="./tables.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-table w-5"></i>
                    <span class="text-black">Tables</span>
                </a>
                <a href="./commandes.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-yellow-50 transition-colors">
                    <i class="fas fa-clipboard-list w-5"></i>
                    <span class="text-black">Commandes</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-200">
                <button id="logout-btn" class="flex items-center gap-3 px-4 py-3 w-full rounded-xl text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span>Déconnexion</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-8 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">Tableau de bord</h1>
                    <div class="flex items-center gap-4">
                        <span id="user-name" class="text-sm text-gray-600"></span>
                        <div class="w-8 h-8 bg-yellow-200 rounded-full flex items-center justify-center">
                            <i class="fas fa-user text-primary text-sm"></i>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Stats Cards -->
            <div class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Commandes aujourd'hui</p>
                                <p id="stats-today" class="text-3xl font-bold text-gray-800">-</p>
                            </div>
                            <i class="fas fa-shopping-bag text-3xl text-primary/50"></i>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Commandes en attente</p>
                                <p id="stats-pending" class="text-3xl font-bold text-yellow-600">-</p>
                            </div>
                            <i class="fas fa-clock text-3xl text-yellow-500/50"></i>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Plats disponibles</p>
                                <p id="stats-plats" class="text-3xl font-bold text-green-600">-</p>
                            </div>
                            <i class="fas fa-utensils text-3xl text-green-500/50"></i>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Tables actives</p>
                                <p id="stats-tables" class="text-3xl font-bold text-primary">-</p>
                            </div>
                            <i class="fas fa-table text-3xl text-primary/50"></i>
                        </div>
                    </div>
                </div>
                
                <!-- Commandes récentes -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-100">
                        <h2 class="font-semibold text-gray-800">Commandes récentes</h2>
                    </div>
                    <div id="recent-orders" class="divide-y divide-gray-100">
                        <div class="p-6 text-center text-gray-500">Chargement...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { auth } from '../shared/js/auth.js';
        import { api } from '../shared/js/api.js';
        import { showToast } from '../shared/js/utils.js';
        
        // Vérifier l'accès admin
        if (!auth.isAdmin()) {
            window.location.href = './index.html';
        }
        
        // Afficher le nom de l'utilisateur
        const userData = auth.getUserData();
        document.getElementById('user-name').textContent = userData?.name || userData?.email || 'Admin';
        
        // Charger les statistiques
        async function loadStats() {
            try {
                // Récupérer les commandes
                const orders = await api.orders.getAll();
                const today = new Date().toISOString().split('T')[0];
                
                const todayOrders = orders.data?.filter(o => o.createdAt?.startsWith(today)) || [];
                const pendingOrders = orders.data?.filter(o => o.status === 'pending') || [];
                
                document.getElementById('stats-today').textContent = todayOrders.length;
                document.getElementById('stats-pending').textContent = pendingOrders.length;
                
                // Récupérer les plats
                const plats = await api.plats.getAll();
                const availablePlats = plats.data?.filter(p => p.is_available) || [];
                document.getElementById('stats-plats').textContent = availablePlats.length;
                
                // Récupérer les tables
                const tables = await api.tables.getAll();
                const activeTables = tables.data?.filter(t => t.is_active) || [];
                document.getElementById('stats-tables').textContent = activeTables.length;
                
                // Afficher les commandes récentes
                const recentOrders = (orders.data || []).slice(0, 5);
                const container = document.getElementById('recent-orders');
                
                if (recentOrders.length === 0) {
                    container.innerHTML = '<div class="p-6 text-center text-gray-500">Aucune commande récente</div>';
                } else {
                    container.innerHTML = recentOrders.map(order => `
                        <div class="p-4 flex items-center justify-between hover:bg-gray-50">
                            <div>
                                <p class="font-medium text-gray-800">Commande #${order.id?.slice(-6)}</p>
                                <p class="text-sm text-gray-500">Table ${order.table?.name || order.table_id} • ${order.customer?.name || 'Client'}</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="px-2 py-1 rounded-full text-xs font-medium ${getStatusClass(order.status)}">
                                    ${getStatusLabel(order.status)}
                                </span>
                                <span class="text-sm text-gray-500">${new Date(order.createdAt).toLocaleTimeString('fr-FR')}</span>
                            </div>
                        </div>
                    `).join('');
                }
                
            } catch (error) {
                console.error('Erreur chargement stats:', error);
                showToast('Erreur de chargement des données', 'error');
            }
        }
        
        function getStatusClass(status) {
            const classes = {
                pending: 'bg-yellow-100 text-yellow-700',
                preparing: 'bg-blue-100 text-blue-700',
                ready: 'bg-green-100 text-green-700',
                served: 'bg-gray-100 text-gray-700',
                cancelled: 'bg-red-100 text-red-700'
            };
            return classes[status] || 'bg-gray-100 text-gray-700';
        }
        
        function getStatusLabel(status) {
            const labels = {
                pending: 'En attente',
                preparing: 'En préparation',
                ready: 'Prêt',
                served: 'Servi',
                cancelled: 'Annulé'
            };
            return labels[status] || status;
        }
        
        // Déconnexion
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await auth.logout();
            window.location.href = './index.html';
        });
        
        // Charger les données
        loadStats();
        
        // Rafraîchir toutes les 30 secondes
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
