<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QRCode - Gestion des commandes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/css/main.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <i class="fas fa-utensils text-2xl text-primary"></i>
                    <span class="font-bold text-lg text-gray-800">Resto QRCode</span>
                </div>
                <p class="text-xs text-gray-500 mt-2">Espace administrateur</p>
            </div>
            
            <nav class="flex-1 p-4 space-y-1">
                <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>Tableau de bord</span>
                </a>
                <a href="./plats.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <i class="fas fa-hamburger w-5"></i>
                    <span>Plats</span>
                </a>
                <a href="./compositions.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <i class="fas fa-pepper-hot w-5"></i>
                    <span>Compositions</span>
                </a>
                <a href="./tables.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <i class="fas fa-table w-5"></i>
                    <span>Tables</span>
                </a>
                <a href="./commandes.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary font-medium">
                    <i class="fas fa-clipboard-list w-5"></i>
                    <span>Commandes</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-200">
                <button id="logout-btn" class="flex items-center gap-3 px-4 py-3 w-full rounded-xl text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span>Déconnexion</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="bg-white border-b border-gray-200 px-8 py-4">
                <h1 class="text-2xl font-bold text-gray-800">Gestion des commandes</h1>
                <p class="text-sm text-gray-500 mt-1">Suivez et gérez les commandes en temps réel</p>
            </header>
            
            <div class="p-8">
                <!-- Filtres -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
                    <div class="flex flex-wrap gap-4 items-center">
                        <div>
                            <label class="text-sm text-gray-600 mr-2">Statut:</label>
                            <select id="status-filter" class="px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="">Tous</option>
                                <option value="pending">En attente</option>
                                <option value="preparing">En préparation</option>
                                <option value="ready">Prêt</option>
                                <option value="served">Servi</option>
                                <option value="cancelled">Annulé</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm text-gray-600 mr-2">Table:</label>
                            <input type="text" id="table-filter" placeholder="Numéro de table" class="px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                        <button id="refresh-orders" class="px-4 py-2 border border-gray-200 rounded-xl hover:bg-gray-50">
                            <i class="fas fa-sync-alt mr-2"></i>Actualiser
                        </button>
                        <label class="flex items-center gap-2 ml-auto">
                            <input type="checkbox" id="auto-refresh" checked class="rounded border-gray-300 text-primary focus:ring-primary">
                            <span class="text-sm">Auto-raffraîchissement (10s)</span>
                        </label>
                    </div>
                </div>
                
                <!-- Liste des commandes -->
                <div id="orders-list" class="space-y-4">
                    <div class="text-center py-12 text-gray-500">Chargement...</div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { auth } from '../shared/js/auth.js';
        import { api, formatPrice, formatDuration } from '../shared/js/api.js';
        import { showToast, escapeHtml, groupItemsByVariant, getVariantLabel } from '../shared/js/utils.js';
        
        // Vérifier l'accès admin
        if (!auth.isAdmin()) {
            window.location.href = './index.html';
        }
        
        let refreshInterval = null;
        const ordersList = document.getElementById('orders-list');
        const statusFilter = document.getElementById('status-filter');
        const tableFilter = document.getElementById('table-filter');
        const refreshBtn = document.getElementById('refresh-orders');
        const autoRefreshCheckbox = document.getElementById('auto-refresh');
        
        async function loadOrders() {
            try {
                const status = statusFilter.value;
                const table = tableFilter.value.trim();
                
                const params = {};
                if (status) params.status = status;
                
                const response = await api.orders.getAll(params);
                let orders = response.data || [];
                
                // Filtre supplémentaire par table côté client
                if (table) {
                    orders = orders.filter(o => 
                        o.table?.number?.toLowerCase().includes(table.toLowerCase()) ||
                        o.table?.name?.toLowerCase().includes(table.toLowerCase())
                    );
                }
                
                renderOrders(orders);
            } catch (error) {
                showToast(error.message, 'error');
                ordersList.innerHTML = '<div class="text-center py-12 text-red-500">Erreur de chargement</div>';
            }
        }
        
        function renderOrders(orders) {
            if (!orders.length) {
                ordersList.innerHTML = '<div class="text-center py-12 text-gray-500">Aucune commande trouvée</div>';
                return;
            }
            
            ordersList.innerHTML = orders.map(order => renderOrderCard(order)).join('');
            
            // Attacher les événements de changement de statut
            document.querySelectorAll('.order-status-select').forEach(select => {
                select.addEventListener('change', async (e) => {
                    const orderId = select.dataset.id;
                    const newStatus = select.value;
                    await updateOrderStatus(orderId, newStatus);
                });
            });
        }
        
        function renderOrderCard(order) {
            const statusInfo = getStatusInfo(order.status);
            const createdAt = new Date(order.createdAt).toLocaleString('fr-FR');
            const estimatedReady = order.estimated_ready_at ? new Date(order.estimated_ready_at).toLocaleTimeString('fr-FR') : null;
            const remainingSeconds = order.estimated_ready_at ? Math.max(0, Math.floor((new Date(order.estimated_ready_at) - Date.now()) / 1000)) : null;
            
            // Grouper les items pour la vue cuisine
            const kitchenGroups = groupOrderItemsForKitchen(order.items || []);
            
            return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 border-b border-gray-100 bg-gray-50">
                        <div class="flex items-center justify-between flex-wrap gap-3">
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="font-bold text-lg">Commande #${escapeHtml(order.id?.slice(-8) || order.id)}</h3>
                                    <span class="px-2 py-1 rounded-full text-xs font-medium ${statusInfo.color}">${statusInfo.text}</span>
                                </div>
                                <div class="flex gap-4 mt-1 text-sm text-gray-500">
                                    <span><i class="fas fa-table mr-1"></i>Table ${escapeHtml(order.table?.name || order.table_id || '-')}</span>
                                    <span><i class="far fa-clock mr-1"></i>${createdAt}</span>
                                    <span><i class="fas fa-user mr-1"></i>${escapeHtml(order.customer?.name || 'Client')}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-bold text-primary">${formatPrice(order.total_price || 0)}</p>
                                ${order.customer?.phone ? `<p class="text-xs text-gray-500">${escapeHtml(order.customer.phone)}</p>` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4">
                        <!-- Vue cuisine regroupée -->
                        <div class="mb-4">
                            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">À préparer</p>
                            <div class="space-y-3">
                                ${kitchenGroups.map(group => `
                                    <div class="border-l-2 border-primary/30 pl-3">
                                        <div class="flex justify-between items-start">
                                            <p class="font-medium">${escapeHtml(group.plat_name)}</p>
                                            <span class="text-sm font-medium">${formatPrice(group.total_price)}</span>
                                        </div>
                                        ${group.variants.map(variant => `
                                            <div class="mt-2 text-sm bg-gray-50 rounded-lg p-2">
                                                <div class="flex justify-between">
                                                    <span class="font-medium text-gray-700">${escapeHtml(variant.label)}</span>
                                                    <span class="text-gray-500">x${variant.quantity}</span>
                                                </div>
                                                ${variant.compositions.length ? `
                                                    <div class="flex flex-wrap gap-1 mt-1">
                                                        ${variant.compositions.map(comp => `
                                                            <span class="text-xs bg-white px-2 py-0.5 rounded-full border border-gray-200">
                                                                ${escapeHtml(comp.action)} ${escapeHtml(comp.composition_name || comp.composition_id)}
                                                            </span>
                                                        `).join('')}
                                                    </div>
                                                ` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <!-- Timer et actions -->
                        <div class="flex flex-wrap items-center justify-between gap-4 pt-4 border-t border-gray-100">
                            <div>
                                ${remainingSeconds !== null && order.status !== 'served' && order.status !== 'cancelled' ? `
                                    <div class="flex items-center gap-2 text-sm">
                                        <i class="fas fa-hourglass-half text-primary"></i>
                                        <span>Temps restant estimé : </span>
                                        <span class="countdown font-mono font-bold text-primary" data-target="${escapeHtml(order.estimated_ready_at)}">
                                            ${formatDuration(remainingSeconds)}
                                        </span>
                                    </div>
                                ` : ''}
                                ${order.note ? `<p class="text-sm text-gray-500 mt-1"><i class="fas fa-comment mr-1"></i>Note: ${escapeHtml(order.note)}</p>` : ''}
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <label class="text-sm text-gray-600">Statut:</label>
                                <select data-id="${escapeHtml(order.id)}" class="order-status-select px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>En attente</option>
                                    <option value="preparing" ${order.status === 'preparing' ? 'selected' : ''}>En préparation</option>
                                    <option value="ready" ${order.status === 'ready' ? 'selected' : ''}>Prêt</option>
                                    <option value="served" ${order.status === 'served' ? 'selected' : ''}>Servi</option>
                                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Annulé</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function groupOrderItemsForKitchen(items) {
            const groups = {};
            
            items.forEach(item => {
                const key = item.plat_id || item.plat_name;
                if (!groups[key]) {
                    groups[key] = {
                        plat_name: item.plat_name,
                        plat_id: item.plat_id,
                        total_price: 0,
                        variants: []
                    };
                }
                
                groups[key].total_price += item.total_price || 0;
                
                const variantGroups = groupItemsByVariant([item]);
                variantGroups.forEach(variant => {
                    groups[key].variants.push({
                        ...variant,
                        quantity: variant.quantity,
                        compositions: variant.compositions
                    });
                });
            });
            
            return Object.values(groups);
        }
        
        async function updateOrderStatus(orderId, status) {
            try {
                await api.orders.updateStatus(orderId, status);
                showToast(`Statut de la commande mis à jour: ${getStatusLabel(status)}`, 'success');
                loadOrders();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        function getStatusInfo(status) {
            const infos = {
                pending: { color: 'bg-yellow-100 text-yellow-700', text: 'En attente' },
                preparing: { color: 'bg-blue-100 text-blue-700', text: 'En préparation' },
                ready: { color: 'bg-green-100 text-green-700', text: 'Prêt' },
                served: { color: 'bg-gray-100 text-gray-700', text: 'Servi' },
                cancelled: { color: 'bg-red-100 text-red-700', text: 'Annulé' }
            };
            return infos[status] || infos.pending;
        }
        
        function getStatusLabel(status) {
            const labels = {
                pending: 'En attente',
                preparing: 'En préparation',
                ready: 'Prêt',
                served: 'Servi',
                cancelled: 'Annulé'
            };
            return labels[status] || status;
        }
        
        function startCountdowns() {
            const updateCountdowns = () => {
                document.querySelectorAll('.countdown').forEach(el => {
                    const target = el.dataset.target;
                    if (!target) return;
                    const remaining = Math.max(0, Math.floor((new Date(target) - Date.now()) / 1000));
                    el.textContent = formatDuration(remaining);
                });
            };
            
            updateCountdowns();
            const interval = setInterval(updateCountdowns, 1000);
            return () => clearInterval(interval);
        }
        
        // Gestion auto-refresh
        function setupAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            
            if (autoRefreshCheckbox.checked) {
                refreshInterval = setInterval(loadOrders, 10000);
            }
        }
        
        autoRefreshCheckbox.addEventListener('change', setupAutoRefresh);
        refreshBtn.addEventListener('click', loadOrders);
        statusFilter.addEventListener('change', loadOrders);
        tableFilter.addEventListener('input', debounce(loadOrders, 500));
        
        // Déconnexion
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await auth.logout();
            window.location.href = './index.html';
        });
        
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        
        // Initialisation
        loadOrders();
        setupAutoRefresh();
        startCountdowns();
    </script>
</body>
</html>
