<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QR - Recherche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./client-shell.css">
</head>
<body class="client-app" data-page="search">
    <div class="app-desktop">
        <aside class="desktop-rail">
            <section class="soft-card desktop-hero rounded-[2rem] p-6">
                <p class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-600">Recherche</p>
                <h2 class="mt-3 text-3xl font-black text-slate-950">Trouver vite un plat</h2>
                <p class="mt-3 text-sm leading-6 text-slate-600">Le moteur de recherche reprend la maquette mobile, avec une lecture plus confortable sur desktop et une selection plus rapide des categories.</p>
                <div class="desktop-stat mt-6 rounded-[1.7rem] p-4 text-white">
                    <span class="desktop-pill"><i class="fas fa-chair"></i> Table <span data-table-label>-</span></span>
                    <p class="mt-4 text-sm text-white/75">Session active <span data-session-timer>--:--</span></p>
                </div>
            </section>
            <section class="soft-card rounded-[2rem] p-4 space-y-2">
                <button class="desktop-link" data-page="index">Accueil</button>
                <button class="desktop-link" data-page="categories">Categories</button>
                <button class="desktop-link" data-page="cart">Panier</button>
                <button class="desktop-link" data-page="tracking">Commandes</button>
            </section>
        </aside>

        <main class="phone-shell">
            <header class="sticky top-0 z-20 flex items-center gap-4 border-b border-gray-200 bg-white px-4 py-3 shadow-sm">
                <button class="text-gray-600 transition hover:text-gray-800" data-back>
                    <i class="fas fa-arrow-left text-xl"></i>
                </button>
                <h1 class="flex-1 text-center text-lg font-semibold text-gray-800">Que cherchez-vous ?</h1>
                <div class="w-8"></div>
            </header>

            <main class="page-main mx-auto max-w-3xl px-4 py-4">
                <div class="mb-6">
                    <label class="relative block">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input id="searchInput" type="text" placeholder="Pizza, burger, salade..." class="w-full rounded-xl border border-gray-200 bg-white py-4 pl-12 pr-4 text-base shadow-sm outline-none focus:ring-2 focus:ring-amber-400">
                    </label>
                </div>

                <section class="mb-8">
                    <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-gray-500">Categories</h2>
                    <div id="searchCategoriesList" class="flex flex-wrap gap-2"></div>
                </section>

                <section>
                    <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-gray-500">Resultats</h2>
                    <div id="resultsContainer" class="space-y-0"></div>
                    <div id="noResults" class="hidden py-8 text-center">
                        <i class="fas fa-utensils mb-2 text-4xl text-gray-300"></i>
                        <p class="text-gray-500">Aucun plat trouve</p>
                    </div>
                </section>
            </main>
        </main>
    </div>
    <div id="clientModalRoot"></div>
    <script type="module" src="./client-search.js"></script>
</body>
</html>
