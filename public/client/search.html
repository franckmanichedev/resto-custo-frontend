<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QR - Recherche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./client-shell.css">
</head>
<body class="client-app" data-page="search">
    <div class="app-desktop">
        <aside class="desktop-rail">
            <div class="soft-card rounded-[2rem] p-6">
                <p class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-600">Recherche</p>
                <h2 class="mt-3 text-3xl font-black text-slate-950">Trouvez votre plat</h2>
                <p class="mt-3 text-sm leading-6 text-slate-600">Cherchez un plat par nom, par categorie ou par envie du moment.</p>
                <div class="mt-5 rounded-[1.5rem] bg-slate-950 px-4 py-4 text-white">
                    <p class="text-xs uppercase tracking-[0.25em] text-white/60">Table active</p>
                    <p class="mt-2 text-xl font-bold" data-table-label>-</p>
                    <p class="mt-1 text-xs text-white/70">Session <span data-session-timer>--:--</span></p>
                </div>
            </div>
            <div class="soft-card mt-5 rounded-[2rem] p-4 space-y-2">
                <button class="desktop-link" data-page="index">Accueil</button>
                <button class="desktop-link" data-page="categories">Categories</button>
                <button class="desktop-link" data-page="cart">Panier</button>
                <button class="desktop-link" data-page="tracking">Commandes</button>
            </div>
        </aside>
        <main class="phone-shell">
            <header class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/90 px-4 py-4 backdrop-blur">
                <div class="flex items-center gap-4">
                    <button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-700" data-back><i class="fas fa-arrow-left"></i></button>
                    <div class="min-w-0 flex-1">
                        <p class="text-xs font-semibold uppercase tracking-[0.32em] text-amber-600">Explorer</p>
                        <h1 class="truncate text-lg font-black text-slate-950">Rechercher</h1>
                    </div>
                </div>
            </header>

            <section class="page-main px-4 pt-4">
                <div class="soft-card rounded-[1.8rem] p-4">
                    <label class="flex items-center gap-3 rounded-[1.4rem] border border-slate-200 bg-slate-50 px-4 py-4">
                        <i class="fas fa-search text-slate-400"></i>
                        <input id="searchInput" type="text" placeholder="Pizza, burger, salade..." class="w-full bg-transparent text-sm text-slate-700 outline-none placeholder:text-slate-400">
                    </label>
                    <div class="no-scrollbar mt-4 flex gap-3 overflow-x-auto pb-2" id="searchCategoriesList"></div>
                </div>

                <section class="mt-6">
                    <div class="mb-4">
                        <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-400">Resultats</p>
                        <h2 class="text-2xl font-black text-slate-950">Plats trouves</h2>
                    </div>
                    <div class="space-y-3" id="resultsContainer"></div>
                    <div id="noResults" class="hidden rounded-[1.7rem] bg-white px-5 py-8 text-center shadow-sm ring-1 ring-slate-200/70">
                        <i class="fas fa-utensils text-4xl text-slate-300"></i>
                        <p class="mt-4 text-sm font-semibold text-slate-600">Aucun plat ne correspond a votre recherche.</p>
                    </div>
                </section>
            </section>
        </main>
    </div>
    <div id="clientModalRoot"></div>
    <script type="module" src="./client-search.js"></script>
</body>
</html>
