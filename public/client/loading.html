<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QR - Chargement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./client-shell.css">
</head>
<body class="client-app" data-page="loading">
    <div class="app-desktop">
        <aside class="desktop-rail">
            <div class="soft-card rounded-[2rem] p-6">
                <p class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-600">Resto QR</p>
                <h2 class="mt-3 text-3xl font-black text-slate-950">Bienvenue</h2>
                <p class="mt-3 text-sm leading-6 text-slate-600">La session de la table est verifiee avant d ouvrir le menu.</p>
            </div>
        </aside>
        <main class="phone-shell overflow-hidden">
            <section class="relative min-h-screen bg-cover bg-center bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1400&q=80');">
                <div class="absolute inset-0 bg-slate-950/55"></div>
                <div class="relative z-10 flex min-h-screen flex-col items-center justify-center px-6 text-center text-white">
                    <div class="mb-6 flex h-24 w-24 items-center justify-center rounded-full border border-white/30 bg-white/10 text-3xl backdrop-blur">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <p class="text-xs font-semibold uppercase tracking-[0.4em] text-amber-300">Resto QR</p>
                    <h1 class="mt-3 text-3xl font-black">Votre table se prepare</h1>
                    <p id="loadingStatus" class="mt-4 text-base font-semibold">Creation de votre session en cours...</p>
                    <p id="loadingHint" class="mt-2 max-w-sm text-sm leading-6 text-white/80">Nous verifions la table scannee avant de charger le menu.</p>
                    <div class="mt-8 flex h-16 w-16 items-center justify-center rounded-full border-4 border-white/20 border-t-amber-400 animate-spin"></div>
                    <button id="seeMenuBtn" class="mt-10 hidden rounded-full bg-amber-500 px-6 py-3 text-sm font-semibold text-white shadow-xl transition hover:bg-amber-600">
                        Voir les menus
                    </button>
                    <button id="retryBtn" class="mt-4 hidden rounded-full border border-white/40 px-6 py-3 text-sm font-semibold text-white/90 backdrop-blur transition hover:bg-white/10">
                        Reessayer
                    </button>
                </div>
            </section>
        </main>
    </div>
    <div id="clientModalRoot"></div>
    <script type="module" src="./client-loading.js"></script>
</body>
</html>
