<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="api-base-url" content="https://resto-custo-backend.onrender.com/api">
    <title>Resto QR - Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./client-shell.css">
</head>
<body class="client-app" data-page="detail">
    <div class="app-desktop">
        <aside class="desktop-rail">
            <div class="soft-card rounded-[2rem] p-6">
                <p class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-600">Detail du plat</p>
                <h2 class="mt-3 text-3xl font-black text-slate-950">Personnalisez votre commande</h2>
                <p class="mt-3 text-sm leading-6 text-slate-600">Choisissez la quantite puis adaptez chaque exemplaire selon vos preferences.</p>
                <div class="mt-5 rounded-[1.5rem] bg-slate-950 px-4 py-4 text-white">
                    <p class="text-xs uppercase tracking-[0.25em] text-white/60">Table active</p>
                    <p class="mt-2 text-xl font-bold" data-table-label>-</p>
                    <p class="mt-1 text-xs text-white/70">Session <span data-session-timer>--:--</span></p>
                </div>
            </div>
            <div class="soft-card mt-5 rounded-[2rem] p-4 space-y-2">
                <button class="desktop-link" data-page="index">Accueil</button>
                <button class="desktop-link" data-page="categories">Categories</button>
                <button class="desktop-link" data-page="cart">Panier</button>
                <button class="desktop-link" data-page="tracking">Commandes</button>
            </div>
        </aside>
        <main class="phone-shell">
            <header class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/90 px-4 py-4 backdrop-blur">
                <div class="flex items-center justify-between gap-4">
                    <button id="backToMenuBtn" class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-700"><i class="fas fa-arrow-left"></i></button>
                    <div class="min-w-0 flex-1 text-center">
                        <p class="text-xs font-semibold uppercase tracking-[0.32em] text-amber-600">Selection</p>
                        <h1 class="truncate text-lg font-black text-slate-950">Detail du plat</h1>
                    </div>
                    <button class="relative rounded-2xl bg-slate-950 px-4 py-3 text-white shadow-lg" data-go-cart>
                        <i class="fas fa-shopping-basket text-lg"></i>
                        <span data-cart-count class="cartBadge absolute -right-2 -top-2 hidden h-6 min-w-6 items-center justify-center rounded-full bg-amber-500 px-2 text-xs font-black text-white">0</span>
                    </button>
                </div>
            </header>

            <section class="page-main px-4 pb-28 pt-4" id="detailPageHost">
                <div class="overflow-hidden rounded-[2rem] bg-white shadow-sm ring-1 ring-slate-200/70">
                    <img id="platImage" src="" alt="" class="h-64 w-full object-cover">
                    <div class="space-y-5 p-5">
                        <div class="flex items-start gap-4">
                            <img id="categorieImage" src="" alt="" class="h-14 w-14 rounded-2xl object-cover ring-2 ring-amber-200">
                            <div class="min-w-0 flex-1">
                                <div class="flex flex-wrap gap-2" id="badgesContainer"></div>
                                <h2 id="platNom" class="mt-3 text-2xl font-black text-slate-950"></h2>
                            </div>
                        </div>
                        <div>
                            <p id="platDescription" class="text-sm leading-6 text-slate-600"></p>
                            <button id="seeMoreBtn" class="mt-2 hidden text-sm font-semibold text-amber-600">Voir plus</button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="rounded-[1.5rem] bg-slate-50 px-4 py-4 text-center">
                                <p class="text-xs uppercase tracking-[0.24em] text-slate-400">Prix</p>
                                <p id="prixUnitaire" class="mt-2 text-lg font-black text-amber-700">0 FCFA</p>
                            </div>
                            <div class="rounded-[1.5rem] bg-slate-50 px-4 py-4 text-center">
                                <p class="text-xs uppercase tracking-[0.24em] text-slate-400">Preparation</p>
                                <p id="tempsPrep" class="mt-2 text-lg font-black text-slate-900">0 min</p>
                            </div>
                        </div>
                        <div>
                            <div class="mb-3 flex items-center justify-between gap-3">
                                <h3 class="text-lg font-black text-slate-950">Personnalisation</h3>
                                <div class="flex items-center overflow-hidden rounded-full bg-slate-100">
                                    <button id="qtyMinus" class="flex h-10 w-10 items-center justify-center text-lg font-bold text-slate-700">-</button>
                                    <span id="qtyValue" class="flex h-10 min-w-14 items-center justify-center text-sm font-black text-slate-900">1</span>
                                    <button id="qtyPlus" class="flex h-10 w-10 items-center justify-center text-lg font-bold text-slate-700">+</button>
                                </div>
                            </div>
                            <div class="space-y-3" id="unitsContainer"></div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="desktop-total border-t border-slate-200/80 bg-white/95 px-4 py-4 backdrop-blur">
                <div class="mx-auto flex max-w-md items-center justify-between gap-4">
                    <div>
                        <p class="text-xs uppercase tracking-[0.24em] text-slate-400">Total</p>
                        <p id="totalPrice" class="mt-1 text-xl font-black text-amber-700">0 FCFA</p>
                    </div>
                    <button id="addToCartBtn" class="rounded-full bg-amber-500 px-6 py-3 text-sm font-semibold text-white shadow-lg transition hover:bg-amber-600">
                        Ajouter au panier
                    </button>
                </div>
            </div>
        </main>
    </div>
    <div id="clientModalRoot"></div>
    <script type="module" src="./client-detail.js"></script>
</body>
</html>
